                          </div>
                          <div style={{marginLeft:24,height:3,background:"#EEE",borderRadius:2}}>
                            <div style={{width:wPct,height:"100%",background:`rgba(${r},${g},${b},${alpha})`,borderRadius:2}}/>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* ── プロジェクト一覧 */}
          <div style={{padding:"20px 28px 48px"}}>
            <div style={{fontSize:11,fontWeight:600,color:"#BBB",letterSpacing:".06em",marginBottom:10}}>すべてのプロジェクト（{projects.length}件）</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:8}}>
              {projects.map(p=>{
                const end=projEnd(p,members);const total=totalDays(p);const isSel=selId===p.id;
                const cflt=conflicts.some(c=>c.a.project.id===p.id||c.b.project.id===p.id);
                return(
                  <div key={p.id} className="pcard" onClick={()=>{setSelId(isSel?null:p.id);setView("project");}}
                    style={{background:isSel?"#F0EFEB":"#fff",border:"1px solid #E8E7E3",
                      borderTop:`3px solid ${p.color.bg}`,padding:"10px 12px",position:"relative"}}>
                    {/* 右上：競合 or 複製ボタン群 */}
                    <div style={{position:"absolute",top:7,right:8,display:"flex",gap:4,alignItems:"center"}}>
                      {cflt&&<span style={{fontSize:10,color:"#E11D48"}}>⚠</span>}
                      <button
                        onClick={e=>{e.stopPropagation();openDuplicate(p);}}
                        title="複製して新規プロジェクト作成"
                        style={{background:"transparent",border:"none",cursor:"pointer",fontSize:13,color:"#CCC",padding:"0 2px",lineHeight:1,transition:"color .15s"}}
                        onMouseEnter={e=>e.target.style.color="#888"}
                        onMouseLeave={e=>e.target.style.color="#CCC"}
                      >⧉</button>
                    </div>
                    <div style={{fontSize:13,color:"#1A1A1A",marginBottom:4,fontWeight:500,paddingRight:28}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#BBB"}}>{fmt(p.startDate)} → {fmt(end)}</div>
                    <div style={{fontSize:11,color:"#CCC",marginTop:3}}>{p.tasks.length}タスク · <span style={{color:p.color.bg}}>{total}</span> 稼働日</div>
                  </div>
                );
              })}
              <div className="pcard" onClick={openAdd} style={{background:"#FAFAF8",border:"1px dashed #DDD",padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:72}}>
                <span style={{fontSize:12,color:"#CCC"}}>+ プロジェクト追加</span>
              </div>
            </div>
          </div>

          {/* ── Dropbox設定モーダル */}
          {showDbxSetup&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}
              onClick={e=>{if(e.target===e.currentTarget)setShowDbxSetup(false);}}>
              <div style={{background:"#fff",border:"1px solid #E8E7E3",borderRadius:10,width:"100%",maxWidth:460,padding:28,boxShadow:"0 8px 32px rgba(0,0,0,.14)"}}>
                <div style={{fontSize:15,fontWeight:600,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                  <svg width="18" height="18" viewBox="0 0 40 40" fill="#0061FF"><path d="M20 7.3L10 13.6l10 6.4 10-6.4L20 7.3zM10 26.4l10 6.3 10-6.3-10-6.4-10 6.4zM10 13.6L0 20l10 6.4 10-6.4L10 13.6zM30 13.6l-10 6.4 10 6.4 10-6.4-10-6.4z"/></svg>
                  Dropbox連携の設定
                </div>
                <p style={{fontSize:12,color:"#666",marginBottom:16,lineHeight:1.6}}>
                  初回のみ、Dropboxアプリに以下のURLを登録する必要があります。<br/>
                  登録済みの場合はそのまま「接続する」を押してください。
                </p>
                <div style={{fontSize:11,fontWeight:600,color:"#888",letterSpacing:".06em",marginBottom:6}}>① Dropboxアプリに登録するRedirect URI</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:20}}>
                  <code style={{flex:1,background:"#F3F4F6",border:"1px solid #E5E7EB",borderRadius:5,padding:"8px 10px",fontSize:12,color:"#1A1A1A",wordBreak:"break-all"}}>
                    {dbxRedirectUri()}
                  </code>
                  <button onClick={()=>navigator.clipboard.writeText(dbxRedirectUri())}
                    style={{padding:"6px 10px",background:"#F3F4F6",border:"1px solid #E5E7EB",borderRadius:5,fontSize:11,cursor:"pointer",flexShrink:0,color:"#555"}}>
                    コピー
                  </button>
                </div>
                <div style={{fontSize:11,color:"#AAA",marginBottom:20,lineHeight:1.6}}>
                  登録先：<a href="https://www.dropbox.com/developers/apps" target="_blank" rel="noreferrer" style={{color:"#0061FF"}}>dropbox.com/developers/apps</a>
                  　→ HD-Schedule-Planner → OAuth 2 → Redirect URIs
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button className="bg" onClick={()=>setShowDbxSetup(false)}>キャンセル</button>
                  <button onClick={doConnectDropbox}
                    style={{padding:"8px 20px",background:"#0061FF",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    接続する
                  </button>
                </div>
              </div>
            </div>
          )}
          {/* ── 編集モーダル */}
          {/* ── Excel出力モーダル */}
          {showExpModal&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}
              onClick={e=>{if(e.target===e.currentTarget)setShowExpModal(false);}}>
              <div style={{background:"#fff",border:"1px solid #E8E7E3",borderRadius:10,width:"100%",maxWidth:480,padding:28,boxShadow:"0 8px 32px rgba(0,0,0,.14)",maxHeight:"90vh",overflowY:"auto"}}>
                <div style={{fontSize:16,fontWeight:600,marginBottom:22,color:"#1A1A1A",display:"flex",alignItems:"center",gap:10}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#217346" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><path d="M6 14l2 2-2 2M13 14h4M13 18h4" strokeWidth="1.8"/>
                  </svg>
                  Excel出力
                </div>

                {/* プロジェクト選択 */}
                <div style={{marginBottom:22}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:10}}>出力するプロジェクト</div>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    {/* 全選択トグル */}
                    <label style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:5,cursor:"pointer",
                      background:expSelIds.length===projects.length?"#F0F9F0":"transparent",
                      border:expSelIds.length===projects.length?"1px solid #D1EDD4":"1px solid transparent",
                    }}>
                      <input type="checkbox"
                        checked={expSelIds.length===projects.length}
                        onChange={e=>setExpSelIds(e.target.checked?projects.map(p=>p.id):[])}
                        style={{width:14,height:14,accentColor:"#217346"}}
                      />
                      <span style={{fontSize:12,color:"#444",fontWeight:500}}>すべて選択</span>
                    </label>
                    <div style={{height:1,background:"#F0EFEB",margin:"4px 0"}}/>
                    {projects.map(p=>{
                      const sel=expSelIds.includes(p.id);
                      const end=projEnd(p,members);
                      const endStr=`${end.getMonth()+1}/${end.getDate()}`;
                      return(
                        <label key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:5,cursor:"pointer",
                          background:sel?"#F8FCF8":"transparent",border:sel?"1px solid #D1EDD4":"1px solid transparent",transition:"all .1s"}}>
                          <input type="checkbox" checked={sel}
                            onChange={e=>setExpSelIds(ids=>e.target.checked?[...ids,p.id]:ids.filter(x=>x!==p.id))}
                            style={{width:14,height:14,accentColor:"#217346",flexShrink:0}}
                          />
                          <div style={{width:10,height:10,borderRadius:2,background:p.color.bg,flexShrink:0}}/>
                          <span style={{fontSize:12,color:"#1A1A1A",flex:1}}>{p.name}</span>
                          <span style={{fontSize:10,color:"#AAA",flexShrink:0}}>{p.startDate.slice(5).replace('-','/')} 〜 {endStr}</span>
                        </label>
                      );
                    })}
                  </div>
                </div>

                {/* 出力期間 */}
                <div style={{marginBottom:22}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:10}}>出力期間</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:6,cursor:"pointer",
                      border:expRangeMode==='project'?"1.5px solid #217346":"1px solid #E8E7E3",
                      background:expRangeMode==='project'?"#F5FCF5":"transparent",transition:"all .15s"}}>
                      <input type="radio" name="rangeMode" value="project"
                        checked={expRangeMode==='project'} onChange={()=>setExpRangeMode('project')}
                        style={{accentColor:"#217346"}}
                      />
                      <div>
                        <div style={{fontSize:13,fontWeight:500,color:"#1A1A1A"}}>プロジェクト全期間</div>
                        <div style={{fontSize:11,color:"#888",marginTop:1}}>選択したプロジェクトの開始日〜終了日</div>
                      </div>
                    </label>
                    <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:6,cursor:"pointer",
                      border:expRangeMode==='custom'?"1.5px solid #217346":"1px solid #E8E7E3",
                      background:expRangeMode==='custom'?"#F5FCF5":"transparent",transition:"all .15s"}}>
                      <input type="radio" name="rangeMode" value="custom"
                        checked={expRangeMode==='custom'} onChange={()=>setExpRangeMode('custom')}
                        style={{accentColor:"#217346"}}
                      />
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:500,color:"#1A1A1A",marginBottom:6}}>期間を指定</div>
                        {expRangeMode==='custom'&&(
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <input type="date" value={expStart} onChange={e=>setExpStart(e.target.value)}
                              style={{flex:1,padding:"5px 8px",fontSize:12,border:"1px solid #D1D0CC",borderRadius:4,background:"#fff"}}/>
                            <span style={{fontSize:12,color:"#AAA",flexShrink:0}}>〜</span>
                            <input type="date" value={expEnd} onChange={e=>setExpEnd(e.target.value)}
                              style={{flex:1,padding:"5px 8px",fontSize:12,border:"1px solid #D1D0CC",borderRadius:4,background:"#fff"}}/>
                          </div>
                        )}
                      </div>
                    </label>
                  </div>
                </div>

                {/* 出力プレビュー */}
                <div style={{background:"#F8F7F5",border:"1px solid #ECEAE6",borderRadius:6,padding:"10px 14px",marginBottom:22,minHeight:44}}>
                  {expSelIds.length===0
                    ?<span style={{fontSize:12,color:"#CCC"}}>プロジェクトを1つ以上選択してください</span>
                    :expEffectiveRange
                      ?<div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,color:"#444",fontWeight:500}}>
                          {`${expEffectiveRange.start.getFullYear()}年${expEffectiveRange.start.getMonth()+1}月${expEffectiveRange.start.getDate()}日`}
                          <span style={{color:"#AAA",margin:"0 6px"}}>〜</span>
                          {`${expEffectiveRange.end.getFullYear()}年${expEffectiveRange.end.getMonth()+1}月${expEffectiveRange.end.getDate()}日`}
                        </span>
                        <span style={{background:"#217346",color:"#fff",fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:10}}>{expEffectiveRange.days}日間</span>
                        <span style={{fontSize:11,color:"#AAA"}}>{expSelIds.length}プロジェクト</span>
                      </div>
                      :<span style={{fontSize:12,color:"#E11D48"}}>期間を正しく入力してください</span>
                  }
                </div>

                {/* ボタン */}
                <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                  <button className="bg" onClick={()=>setShowExpModal(false)}>キャンセル</button>
                  <button
                    onClick={()=>{
                      if(!expEffectiveRange||!expSelIds.length)return;
                      runExportGanttExcel(expSelIds,expEffectiveRange.start,expEffectiveRange.end);
                      setShowExpModal(false);
                    }}
                    disabled={!expEffectiveRange||!expSelIds.length}
                    style={{padding:"8px 20px",background:expEffectiveRange&&expSelIds.length?"#217346":"#D1D0CC",
                      color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:600,cursor:expEffectiveRange&&expSelIds.length?"pointer":"not-allowed"}}>
                    ダウンロード
                  </button>
                </div>
              </div>
            </div>
          )}

          {showModal&&form&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}
              onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
              <div className="fi mw" style={{background:"#fff",border:"1px solid #E8E7E3",borderRadius:10,width:"100%",maxWidth:540,padding:28,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.12)"}}>
                <div style={{fontSize:16,fontWeight:600,marginBottom:20,color:"#1A1A1A",display:"flex",alignItems:"center",gap:10}}>
                  {editProj?"プロジェクト編集":isDuplicate?"プロジェクトを複製":"新規プロジェクト"}
                  {isDuplicate&&<span style={{fontSize:11,color:"#10B981",background:"#F0FDF4",border:"1px solid #BBF7D0",padding:"2px 8px",borderRadius:10,fontWeight:500}}>タスク・設定を引き継ぎ</span>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:5}}>プロジェクト名</div>
                    <input className="if" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="プロジェクト名"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:5}}>開始日</div>
                      <input className="if" type="date" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/>
                    </div>
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:5}}>自動計算 終了日</div>
                      <div style={{background:"#F8F7F5",border:"1px solid #EEE",padding:"8px 10px",fontSize:13,color:computedEnd?"#10B981":"#CCC",borderRadius:4,fontWeight:computedEnd?500:400}}>
                        {computedEnd?fmt(computedEnd):"—"}
                        {form.tasks.length>0&&<span style={{fontSize:11,color:"#CCC",marginLeft:6}}>（{form.tasks.reduce((s,t)=>s+(parseInt(t.days)||0),0)}日）</span>}
                      </div>
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:8}}>カラー</div>
                    <div style={{display:"flex",gap:8}}>
                      {PCOLS.map(c=>(
                        <div key={c.id} onClick={()=>setForm(f=>({...f,colorId:c.id}))}
                          style={{width:24,height:24,borderRadius:6,background:c.bg,cursor:"pointer",transition:"transform .12s, box-shadow .12s",
                                  boxShadow:form.colorId===c.id?`0 0 0 2px #fff, 0 0 0 4px ${c.bg}`:"none",
                                  transform:form.colorId===c.id?"scale(1.15)":"scale(1)"}}/>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em",marginBottom:5}}>メモ（任意）</div>
                    <input className="if" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="備考など"/>
                  </div>

                  {/* タスクリスト */}
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontSize:11,fontWeight:600,color:"#AAA",letterSpacing:".06em"}}>タスク（{form.tasks.length}件）</div>
                        <div style={{fontSize:10,color:"#CCC"}}>順番 = 依存順序 · ⠿ ドラッグで並び替え</div>
                      </div>
                      <button className="bs" onClick={addTask}>+ 追加</button>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {form.tasks.map((t,idx)=>{
                        const cflt=formConflictIds.has(t.id);
                        const isDragging=dragIdx.current===idx;
                        const isDragOver=dragOverIdx===idx&&dragIdx.current!==null&&dragIdx.current!==idx;
                        return(
                          <div key={t.id}>
                            {isDragOver&&dragIdx.current>idx&&<div style={{height:2,background:"#38BDF8",borderRadius:1,marginBottom:2}}/>}
                            <div draggable
                              onDragStart={()=>handleDragStart(idx)}
                              onDragOver={e=>handleDragOver(e,idx)}
                              onDrop={()=>handleDrop(idx)}
                              onDragEnd={handleDragEnd}
                              style={{display:"flex",flexDirection:"column",gap:6,padding:"6px 0",
                                opacity:isDragging?.4:1,
                                background:isDragOver?"rgba(56,189,248,.06)":"transparent",
                                transition:"opacity .1s",borderRadius:4}}>
                              {/* 上段：タスク名・日数・土曜・操作 */}
                              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                <span className="drag-handle">⠿</span>
                                <span style={{fontSize:10,color:"#CCC",width:14,textAlign:"right",flexShrink:0}}>{idx+1}</span>
                                <input className="if" style={{flex:1}} value={t.name} onChange={e=>updTask(t.id,"name",e.target.value)} placeholder={`タスク ${idx+1}`}/>
                                <input className="if" type="number" min="1" value={t.days} onChange={e=>updTask(t.id,"days",e.target.value)} style={{width:54}}/>
                                <span style={{fontSize:11,color:"#CCC",flexShrink:0}}>日</span>
                                {/* 土曜稼働スイッチ（土固ONのときは無効） */}
                                <div title={t.satOnly?"土固ONのため無効":t.workSat?"土曜稼働あり（クリックで解除）":"土曜稼働なし（クリックで有効）"}
                                  onClick={()=>{if(!t.satOnly)updTask(t.id,"workSat",!(t.workSat||false));}}
                                  style={{display:"flex",alignItems:"center",gap:3,cursor:t.satOnly?"default":"pointer",flexShrink:0,userSelect:"none",opacity:t.satOnly?.3:1,transition:"opacity .2s"}}>
                                  <div style={{width:28,height:15,borderRadius:8,background:t.workSat&&!t.satOnly?"#10B981":"#E0DFDB",position:"relative",transition:"background .2s",flexShrink:0}}>
                                    <div style={{position:"absolute",top:2,left:t.workSat&&!t.satOnly?13:2,width:11,height:11,borderRadius:"50%",background:"#fff",transition:"left .15s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
                                  </div>
                                  <span style={{fontSize:10,color:t.workSat&&!t.satOnly?"#10B981":"#CCC",fontWeight:600,minWidth:10}}>土</span>
                                </div>
                                {/* 土曜固定スイッチ */}
                                <div title={t.satOnly?"土曜固定（クリックで解除）":"土曜のみ稼働に固定（クリックで有効）"}
                                  onClick={()=>{
                                    const so=!(t.satOnly||false);
                                    setForm(f=>({...f,tasks:f.tasks.map(x=>x.id===t.id?{...x,satOnly:so,workSat:so?false:x.workSat}:x)}));
                                  }}
                                  style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",flexShrink:0,userSelect:"none"}}>
                                  <div style={{width:28,height:15,borderRadius:8,background:t.satOnly?"#8B5CF6":"#E0DFDB",position:"relative",transition:"background .2s",flexShrink:0}}>
                                    <div style={{position:"absolute",top:2,left:t.satOnly?13:2,width:11,height:11,borderRadius:"50%",background:"#fff",transition:"left .15s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
                                  </div>
                                  <span style={{fontSize:10,color:t.satOnly?"#8B5CF6":"#CCC",fontWeight:600,minWidth:14}}>土固</span>
                                </div>
                                <button className="bs" disabled={idx===0} onClick={()=>mvTask(t.id,-1)}>↑</button>
                                <button className="bs" disabled={idx===form.tasks.length-1} onClick={()=>mvTask(t.id,1)}>↓</button>
                                <button className="bs" style={{color:"#EF4444",borderColor:"#FCA5A5"}} onClick={()=>delTask(t.id)}>✕</button>
                              </div>
                              {/* 下段：メンバー複数選択チップ */}
                              <div style={{display:"flex",flexWrap:"wrap",gap:4,paddingLeft:22,alignItems:"center"}}>
                                <span style={{fontSize:10,color:"#CCC",flexShrink:0}}>担当：</span>
                                {members.length===0
                                  ?<span style={{fontSize:11,color:"#DDD"}}>メンバーなし</span>
                                  :members.map(m=>{
                                    const sel=(t.assigneeIds||[]).includes(m.id);
                                    const{r:mr,g:mg,b:mb}=hex2rgb(m.color);
                                    return(
                                      <div key={m.id} onClick={()=>toggleAssignee(t.id,m.id)}
                                        style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",
                                          borderRadius:10,cursor:"pointer",userSelect:"none",
                                          background:sel?`rgba(${mr},${mg},${mb},.12)`:"transparent",
                                          border:`1px solid ${sel?m.color:"#E5E5E5"}`,
                                          transition:"all .12s"}}>
                                        <div style={{width:8,height:8,borderRadius:"50%",background:m.color,flexShrink:0}}/>
                                        <span style={{fontSize:11,color:sel?"#1A1A1A":"#AAA",fontWeight:sel?500:400}}>{m.name}</span>
                                      </div>
                                    );
                                  })
                                }
                              </div>
                            </div>
                            {isDragOver&&dragIdx.current<idx&&<div style={{height:2,background:"#38BDF8",borderRadius:1,marginTop:2}}/>}
                            {cflt&&<div style={{marginLeft:26,fontSize:11,color:"#E11D48",marginTop:3}}>⚠ このメンバーは同期間に別タスクがあります</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
                {formErr&&<div style={{fontSize:12,color:"#E11D48",marginTop:12}}>{formErr}</div>}
                <div style={{display:"flex",gap:10,marginTop:22,justifyContent:"flex-end"}}>
                  <button className="bg" onClick={()=>setShowModal(false)}>キャンセル</button>
                  <button className="bp" onClick={submitForm}>{editProj?"更新する":isDuplicate?"複製して追加":"追加する"}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
